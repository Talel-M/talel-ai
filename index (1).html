<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Talel AI">
<meta name="theme-color" content="#020408">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Talel AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#020408;--s1:#050a12;--s2:#080f1c;--s3:#0b1525;
  --b1:#0d1e30;--b2:#162840;--b3:#1e3a5f;
  --blue:#1464f4;--blue2:#3d7fff;--blue3:#6aa0ff;
  --cyan:#00b8e6;--white:#dce8ff;--muted:#8faac8;--dim:#3a5570;
  --red:#e05252;--green:#34c78a;
  --font:'Inter',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --radius:8px;--transition:.16s ease;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--white);font-family:var(--font);display:flex;flex-direction:column;font-size:14px;line-height:1.5}

/* WATERMARK */
body::before{
  content:'TALEL AI';position:fixed;
  top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);
  font-size:clamp(70px,16vw,160px);font-weight:800;
  color:rgba(20,100,244,.028);pointer-events:none;z-index:0;
  white-space:nowrap;letter-spacing:16px;font-family:var(--font);
}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

/* HEADER */
header{
  height:50px;padding:0 18px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(2,4,8,.97);border-bottom:1px solid var(--b1);
  position:relative;z-index:20;
}
.logo{display:flex;align-items:center;gap:9px}
.logo-img{width:28px;height:28px;border-radius:7px;overflow:hidden;box-shadow:0 0 14px rgba(20,100,244,.4);flex-shrink:0}
.logo-img img{width:100%;height:100%;object-fit:cover}
.logo-wordmark{font-size:14px;font-weight:700;letter-spacing:-.3px;color:var(--white)}
.logo-wordmark b{color:var(--blue2);font-weight:400}
.logo-version{font-size:9px;font-family:var(--mono);color:var(--dim);margin-top:1px;letter-spacing:1px}
.hright{display:flex;align-items:center;gap:6px}
.hbtn{
  padding:4px 11px;border-radius:5px;border:1px solid var(--b1);
  background:transparent;color:var(--muted);font-size:10px;
  font-family:var(--mono);cursor:pointer;transition:all var(--transition);
  text-transform:uppercase;letter-spacing:.8px;
}
.hbtn:hover{border-color:var(--b3);color:var(--white);background:rgba(20,100,244,.06)}
.lang-select{
  padding:4px 8px;border-radius:5px;border:1px solid var(--b1);
  background:var(--s1);color:var(--muted);font-size:10px;
  font-family:var(--mono);cursor:pointer;outline:none;
  text-transform:uppercase;letter-spacing:.5px;
}
.lang-select:focus{border-color:var(--b3)}
.status-pill{
  display:flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:4px;
  border:1px solid rgba(52,199,138,.15);background:rgba(52,199,138,.05);
  font-size:9px;font-family:var(--mono);color:var(--green);letter-spacing:.5px;
}
.status-dot{width:4px;height:4px;border-radius:50%;background:var(--green);animation:statusPulse 2s infinite}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* USAGE BAR */
.usage-bar{
  height:28px;padding:0 18px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  background:var(--s1);border-bottom:1px solid var(--b1);
  position:relative;z-index:15;
}
.usage-label{font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1.2px}
.usage-track{flex:1;height:2px;background:var(--b1);border-radius:2px;overflow:hidden}
.usage-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .6s ease;width:0%}
.usage-count{font-size:9px;font-family:var(--mono);color:var(--dim)}

/* CHIPS */
.chips{
  padding:5px 14px;flex-shrink:0;
  display:flex;gap:5px;overflow-x:auto;
  background:var(--s1);border-bottom:1px solid var(--b1);
  position:relative;z-index:15;scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:3px 11px;border-radius:4px;
  border:1px solid var(--b1);background:transparent;
  color:var(--dim);font-size:9px;font-family:var(--mono);
  cursor:pointer;transition:all var(--transition);
  white-space:nowrap;text-transform:uppercase;letter-spacing:.8px;
}
.chip:hover{border-color:var(--b3);color:var(--muted);background:rgba(20,100,244,.04)}

/* UPLOAD BAR */
.upload-bar{
  padding:4px 14px;flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  background:var(--s1);border-bottom:1px solid var(--b1);
  position:relative;z-index:15;
}
.ubtn{
  padding:3px 11px;border-radius:4px;border:1px solid var(--b1);
  background:transparent;color:var(--blue3);font-size:9px;
  font-family:var(--mono);cursor:pointer;transition:all var(--transition);
  text-transform:uppercase;letter-spacing:.8px;
}
.ubtn:hover{border-color:var(--blue2);background:rgba(20,100,244,.06)}
.ubtn.cam{color:var(--cyan);border-color:rgba(0,184,230,.15)}
.ubtn.cam:hover{border-color:var(--cyan)}
#imgInput,#camInput{display:none}
#imgPreview{
  display:none;align-items:center;gap:5px;
  padding:2px 8px;border-radius:4px;
  border:1px solid rgba(20,100,244,.2);background:rgba(20,100,244,.04);
}
#imgPreview img{width:22px;height:22px;object-fit:cover;border-radius:3px}
#imgPreview .pname{font-size:9px;font-family:var(--mono);color:var(--blue3);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#imgPreview .prm{cursor:pointer;color:var(--dim);font-size:11px;font-family:var(--mono);transition:color var(--transition)}
#imgPreview .prm:hover{color:var(--red)}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:20px 18px 10px;position:relative;z-index:5}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding:28px 16px 20px;animation:riseUp .5s cubic-bezier(.16,1,.3,1)}
@keyframes riseUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.w-logo{width:68px;height:68px;border-radius:16px;overflow:hidden;margin-bottom:18px;box-shadow:0 0 0 1px var(--b2),0 0 32px rgba(20,100,244,.25),0 0 64px rgba(0,184,230,.08);animation:logoFloat 5s ease-in-out infinite}
.w-logo img{width:100%;height:100%;object-fit:cover}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.w-title{font-size:24px;font-weight:700;letter-spacing:-.8px;margin-bottom:2px}
.w-title b{color:var(--blue2);font-weight:300}
.w-tagline{font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.w-desc{font-size:12px;color:var(--muted);line-height:1.7;max-width:360px;margin-bottom:22px}
.w-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;max-width:380px}
.wcard{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--radius);
  padding:13px 12px;text-align:left;cursor:pointer;transition:all .18s;
}
.wcard:hover{border-color:var(--b2);background:var(--s2)}
.wcard-cat{font-size:8px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
.wcard-title{font-size:12px;font-weight:600;color:var(--white);margin-bottom:2px}
.wcard-desc{font-size:10px;color:var(--muted);line-height:1.4}

/* MESSAGES */
.msg{display:flex;gap:9px;margin-bottom:18px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:2px}
.av.ai{border:1px solid var(--b2);box-shadow:0 0 8px rgba(20,100,244,.12)}
.av.ai img{width:100%;height:100%;object-fit:cover}
.av.user{background:var(--s3);border:1px solid var(--b2);color:var(--blue3);font-family:var(--mono)}
.mbody{max-width:80%;display:flex;flex-direction:column;gap:3px}
.msg.user .mbody{align-items:flex-end}
.bubble{padding:10px 14px;border-radius:var(--radius);font-size:13.5px;line-height:1.75;position:relative}
.bubble.ai{background:var(--s2);border:1px solid var(--b1);border-top-right-radius:2px;color:var(--white)}
.bubble.user{background:rgba(20,100,244,.12);border:1px solid rgba(20,100,244,.22);border-top-left-radius:2px}
.bubble img{max-width:200px;border-radius:6px;margin-bottom:8px;display:block;border:1px solid var(--b1)}
.bubble code{font-family:var(--mono);background:rgba(20,100,244,.1);color:var(--blue3);padding:1px 5px;border-radius:3px;font-size:11.5px}
.bubble pre{background:#010306;border:1px solid var(--b2);border-radius:7px;padding:13px;margin:8px 0;overflow-x:auto;font-family:var(--mono);font-size:11.5px;color:var(--blue3);direction:ltr;text-align:left;line-height:1.65}
.bubble strong{color:var(--blue3);font-weight:600}
.copy-btn{position:absolute;top:7px;left:7px;padding:2px 7px;border-radius:3px;border:1px solid var(--b1);background:var(--s1);color:var(--dim);font-size:8px;font-family:var(--mono);cursor:pointer;opacity:0;transition:all .15s;text-transform:uppercase;letter-spacing:.8px}
.bubble.ai:hover .copy-btn{opacity:1}
.copy-btn:hover{color:var(--white);border-color:var(--b3)}
.copy-btn.ok{color:var(--green);border-color:var(--green)}
.mtime{font-size:8.5px;color:var(--dim);font-family:var(--mono);padding:0 2px}

/* TYPING */
.typing{display:flex;gap:9px;margin-bottom:18px;animation:msgIn .25s ease}
.tbub{background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius);border-top-right-radius:2px;padding:12px 16px;display:flex;align-items:center;gap:4px}
.tbub span{width:5px;height:5px;border-radius:50%;animation:td 1.2s ease-in-out infinite}
.tbub span:nth-child(1){background:var(--blue)}
.tbub span:nth-child(2){background:var(--cyan);animation-delay:.15s}
.tbub span:nth-child(3){background:var(--blue2);animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

/* INPUT ZONE */
.izone{padding:10px 14px 12px;background:rgba(2,4,8,.98);border-top:1px solid var(--b1);flex-shrink:0;position:relative;z-index:20}
.ibox{display:flex;gap:8px;align-items:flex-end;background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius);padding:9px 12px;transition:all var(--transition)}
.ibox:focus-within{border-color:rgba(20,100,244,.4);box-shadow:0 0 0 3px rgba(20,100,244,.06)}
#userInput{flex:1;background:transparent;border:none;outline:none;color:var(--white);font-family:var(--font);font-size:13.5px;resize:none;max-height:120px;line-height:1.6;direction:ltr}
#userInput::placeholder{color:var(--dim)}
#sendBtn{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--transition);color:white;font-size:13px;box-shadow:0 3px 10px rgba(20,100,244,.3)}
#sendBtn:hover{transform:scale(1.05);box-shadow:0 5px 18px rgba(0,184,230,.35)}
#sendBtn:active{transform:scale(.94)}
#sendBtn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.ifoot{display:flex;justify-content:space-between;margin-top:5px;padding:0 2px}
.ifoot-hint{font-size:8.5px;color:var(--dim);font-family:var(--mono)}
.ifoot-brand{font-size:8.5px;color:var(--dim);font-family:var(--mono);letter-spacing:1.5px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;right:0;width:255px;height:100%;background:var(--s1);border-left:1px solid var(--b1);z-index:50;transform:translateX(100%);transition:transform .28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:13px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.sb-label{font-size:9px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}
.sb-close{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;font-family:var(--mono);transition:color var(--transition)}
.sb-close:hover{color:var(--white)}
.sb-new{margin:8px 10px;padding:8px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--blue3);font-family:var(--mono);font-size:9px;cursor:pointer;transition:all var(--transition);text-transform:uppercase;letter-spacing:1px}
.sb-new:hover{border-color:var(--b3);background:rgba(20,100,244,.05)}
.sb-list{flex:1;overflow-y:auto;padding:3px 8px}
.ci{padding:8px 9px;border-radius:5px;cursor:pointer;transition:all var(--transition);margin-bottom:2px;border:1px solid transparent}
.ci:hover{background:var(--s2);border-color:var(--b1)}
.ci.active{background:var(--s3);border-color:var(--b2)}
.ci-title{font-size:11px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.ci-date{font-size:8.5px;color:var(--dim);font-family:var(--mono)}
.overlay{position:fixed;inset:0;z-index:45;display:none}
.overlay.show{display:block}

/* ONBOARDING */
.ob-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;animation:obFade .35s ease}
@keyframes obFade{from{opacity:0}to{opacity:1}}
.ob-card{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:28px 26px;width:100%;max-width:440px;box-shadow:0 0 60px rgba(20,100,244,.12),0 0 0 1px var(--b1)}
.ob-header{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
.ob-logo{width:44px;height:44px;border-radius:11px;overflow:hidden;margin-bottom:14px;box-shadow:0 0 24px rgba(20,100,244,.3)}
.ob-logo img{width:100%;height:100%;object-fit:cover}
.ob-progress{display:flex;gap:3px;margin-bottom:14px}
.ob-prog-dot{width:18px;height:2px;border-radius:2px;background:var(--b2);transition:all .3s}
.ob-prog-dot.active{background:var(--blue2);width:28px}
.ob-prog-dot.done{background:var(--b3)}
.ob-step-label{font-size:8.5px;font-family:var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.ob-title{font-size:18px;font-weight:700;letter-spacing:-.5px;color:var(--white);margin-bottom:3px;text-align:center}
.ob-sub{font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
.ob-body{display:flex;flex-direction:column;gap:12px}
.ob-field{}
.ob-label{font-size:9px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;display:block;margin-bottom:5px}
.ob-req{color:var(--red);margin-left:2px}
.ob-input{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:9px 13px;color:var(--white);font-family:var(--font);font-size:13px;outline:none;transition:all var(--transition)}
.ob-input:focus{border-color:rgba(20,100,244,.5);box-shadow:0 0 0 3px rgba(20,100,244,.07)}
.ob-input.err{border-color:rgba(224,82,82,.5);box-shadow:0 0 0 3px rgba(224,82,82,.07)}
.ob-select{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:9px 13px;color:var(--white);font-family:var(--font);font-size:13px;outline:none;cursor:pointer;transition:all var(--transition);appearance:none}
.ob-select:focus{border-color:rgba(20,100,244,.5)}
.ob-opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px}
.ob-opt{padding:8px 10px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--muted);font-family:var(--font);font-size:11.5px;cursor:pointer;transition:all var(--transition);text-align:center}
.ob-opt:hover{border-color:var(--b2);color:var(--white)}
.ob-opt.sel{border-color:var(--blue2);color:var(--blue3);background:rgba(20,100,244,.08)}
.ob-err{font-size:10px;font-family:var(--mono);color:var(--red);margin-top:3px;display:none}
.ob-btn{width:100%;margin-top:16px;padding:11px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--cyan));border:none;color:white;font-family:var(--font);font-weight:600;font-size:13px;cursor:pointer;transition:all var(--transition);letter-spacing:.3px;box-shadow:0 4px 16px rgba(20,100,244,.2)}
.ob-btn:hover{transform:translateY(-1px);box-shadow:0 7px 24px rgba(0,184,230,.28)}
.ob-btn:active{transform:translateY(0)}
</style>
</head>
<body>

</div>

<div class="chips" id="chips-bar">
  <div class="chip" onclick="quickSend(T('q_math'))">Math</div>
  <div class="chip" onclick="quickSend(T('q_cyber'))">Cyber</div>
  <div class="chip" onclick="quickSend(T('q_code'))">Code</div>

</div>

<input type="file" id="imgInput" accept="image/*" onchange="handleImg(this)" style="display:none">
<input type="file" id="camInput" accept="image/*" capture="environment" onchange="handleImg(this)" style="display:none">

<div id="chat"><div id="welcome-container"></div></div>

<!-- ATTACH MENU -->
<div id="attachMenu" style="display:none;position:fixed;bottom:80px;left:18px;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:6px;z-index:30;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:riseUp .18s ease;">
  <button onclick="document.getElementById('imgInput').click();closeAttach()" id="ubtn-gallery" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border-radius:7px;border:none;background:transparent;color:var(--white);font-size:13px;cursor:pointer;transition:background .15s;text-align:left;" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='transparent'">
    <span style="font-size:18px;">🖼️</span> <span id="ubtn-gallery-lbl">Gallery</span>
  </button>
  <button onclick="document.getElementById('camInput').click();closeAttach()" id="ubtn-camera" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 14px;border-radius:7px;border:none;background:transparent;color:var(--white);font-size:13px;cursor:pointer;transition:background .15s;text-align:left;" onmouseover="this.style.background='var(--s3)'" onmouseout="this.style.background='transparent'">
    <span style="font-size:18px;">📷</span> <span id="ubtn-camera-lbl">Camera</span>
  </button>
</div>

<div class="izone">
  <div id="imgPreview" style="display:none;align-items:center;gap:6px;padding:5px 4px 2px;">
    <img id="prevThumb" src="" alt="" style="width:28px;height:28px;object-fit:cover;border-radius:5px;border:1px solid var(--b2);">
    <span class="pname" id="prevName" style="font-size:10px;font-family:var(--mono);color:var(--blue3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    <span onclick="removeImg()" style="cursor:pointer;color:var(--dim);font-size:12px;font-family:var(--mono);transition:color .15s;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--dim)'">✕</span>
  </div>
  <div class="ibox">
    <button id="attachBtn" onclick="toggleAttach()" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--b2);background:transparent;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;line-height:1;" onmouseover="this.style.borderColor='var(--blue2)';this.style.color='var(--blue3)'" onmouseout="this.style.borderColor='var(--b2)';this.style.color='var(--muted)'">+</button>
    <textarea id="userInput" rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>
  <div class="ifoot">
    <span class="ifoot-hint" id="input-hint">Enter to send · Shift+Enter for new line</span>
    <span class="ifoot-brand">TALEL AI · 2026</span>
  </div>
</div>

</div>

function selOpt(fid, btn, val) {
  btn.closest('.ob-opts').querySelectorAll('.ob-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  obSel[fid] = val;
  document.getElementById('obf_'+fid+'_err').style.display = 'none';

let pendingOtp = null;
let otpExpiry = null;

async function sendOtpEmail() {
  const email = obData.email;
  const name = obData.name || 'User';
  if (!email) return false;

  const otp = Math.floor(100000 + Math.random() * 900000).toString();
  const expiresAt = Date.now() + 10 * 60 * 1000;

  try {
    const res = await fetch('/.netlify/functions/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name, otp })
    });
    const data = await res.json();
    console.log('OTP response:', res.status, data);
    if (data.success) {
      pendingOtp = otp;
      otpExpiry = expiresAt;
      return true;
    } else {
      const errEl = document.getElementById('obf_otp_err');
      if(errEl) { errEl.textContent = 'Failed: ' + (data.error || 'Try again'); errEl.style.display = 'block'; }
      return false;
    }
  } catch(e) {
    console.error('OTP error:', e);
    return false;
  }
}

function resendOtp(e) {
  const btn = e ? e.target : document.querySelector('[onclick="resendOtp(event)"]');
  if(btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
  sendOtpEmail().then((ok) => {
    if(btn) { btn.textContent = ok ? 'Code Resent!' : 'Failed — try again'; setTimeout(() => { btn.textContent = 'Resend Code'; btn.disabled = false; }, 3000); }
    const status = document.getElementById('otp-status');
    if(status && ok) { status.style.display = 'block'; setTimeout(() => status.style.display = 'none', 4000); }
  });
}

function handleObPhoto(inp) {
  const f = inp.files && inp.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => { obData['photo'] = e.target.result; renderOb(); };
  r.readAsDataURL(f);
}

function obNext() {
  const l = LANGS[lang];
  const struct = OB_STRUCTURE[obStep];
  let valid = true;
  struct.fields.forEach(fid => {
    const isGrid = ['status','goal','level'].includes(fid);
    const isSelect = fid === 'country';
    const isPhoto = fid === 'photo';
    const isOtp = fid === 'otp_verify';
    let val = '';
    if (isOtp) {
      const entered = (document.getElementById('obf_otp')?.value || '').trim();
      const now = Date.now();
      if (!entered || entered.length !== 6) {
        const err = document.getElementById('obf_otp_err');
        if(err) { err.textContent = 'Please enter the 6-digit code.'; err.style.display = 'block'; }
        valid = false;
      } else if (!pendingOtp || now > otpExpiry) {
        const err = document.getElementById('obf_otp_err');
        if(err) { err.textContent = 'Code expired. Please resend.'; err.style.display = 'block'; }
        valid = false;
      } else if (entered !== pendingOtp) {
        const err = document.getElementById('obf_otp_err');
        if(err) { err.textContent = 'Incorrect code. Please try again.'; err.style.display = 'block'; }
        valid = false;
      } else {
        const err = document.getElementById('obf_otp_err');
        if(err) err.style.display = 'none';
        obData['email_verified'] = true;
      }
      return;
    }
    if (fid === 'email') {
      const el = document.getElementById('obf_email');
      val = el ? el.value.trim() : '';
      if (val) obData[fid] = val;
      if (!val) {
        document.getElementById('obf_email_err').style.display = 'block';
        el?.classList.add('err');
        valid = false;
      } else if (!val.endsWith('@gmail.com')) {
        document.getElementById('obf_email_err').style.display = 'block';
        document.getElementById('obf_email_err').textContent = 'Only Gmail addresses accepted (must end with @gmail.com)';
        el?.classList.add('err');
        valid = false;
      } else {
        document.getElementById('obf_email_err').style.display = 'none';
        el?.classList.remove('err');
      }
      return;
    }
    if (isPhoto) {
      val = obData['photo'] || '';
      if (!val) {
        const err = document.getElementById('obf_photo_err');
        if(err) err.style.display = 'block';
        valid = false;
      } else {
        const err = document.getElementById('obf_photo_err');
        if(err) err.style.display = 'none';
      }
      return;
    }
    if (isGrid) val = obSel[fid] || '';
    else { const el = document.getElementById('obf_'+fid); val = el ? el.value.trim() : ''; if(val) obData[fid] = val; }
    if (isSelect) { const el = document.getElementById('obf_'+fid); val = el ? el.value : ''; if(val) obData[fid] = val; }
    if (!val) {
      document.getElementById('obf_'+fid+'_err').style.display = 'block';
      const inp = document.getElementById('obf_'+fid);
      if(inp) inp.classList.add('err');
      valid = false;
    } else {
      document.getElementById('obf_'+fid+'_err').style.display = 'none';
      const inp = document.getElementById('obf_'+fid);
      if(inp) inp.classList.remove('err');
    }
  });
  if (!valid) return;
  struct.fields.forEach(fid => {
    if (fid === 'otp_verify') return;
    if (fid === 'photo') return;
    const isGrid = ['status','goal','level'].includes(fid);
    if (isGrid) { obData[fid] = obSel[fid] || ''; }
    else { 
      const el = document.getElementById('obf_' + fid); 
      if (el) { obData[fid] = el.value.trim(); console.log('Saved', fid, '=', obData[fid]); }
    }
  });
  if (obStep < OB_STRUCTURE.length - 1) {
    obStep++;
    renderOb();
    // If we just moved TO the OTP step, send the email now
    if (OB_STRUCTURE[obStep].fields.includes('otp_verify')) {
      console.log('Moving to OTP step, email:', obData.email, 'name:', obData.name);
      const statusEl = document.getElementById('otp-status');
      if (statusEl) { 
        statusEl.textContent = 'Sending verification code...'; 
        statusEl.style.display = 'block'; 
        statusEl.style.color = 'var(--muted)'; 
      }
      sendOtpEmail().then(ok => {
        console.log('OTP result:', ok);
        const statusEl2 = document.getElementById('otp-status');
        const errEl = document.getElementById('obf_otp_err');
        if (ok) {
          if (statusEl2) { 
            statusEl2.textContent = 'Code sent! Check your inbox and spam folder.'; 
            statusEl2.style.color = 'var(--green)';
            statusEl2.style.display = 'block';
          }
        } else {
          if (statusEl2) statusEl2.style.display = 'none';
          if (errEl) { errEl.textContent = 'Failed to send. Click Resend Code.'; errEl.style.display = 'block'; }
        }
      });
    }
  }
  else { finishOb(); }
}

function onPwInput(val) {
  const face = document.getElementById('pw-mascot-face');
  const msg = document.getElementById('pw-mascot-msg');
  const bar = document.getElementById('pw-strength-bar');
  const lbl = document.getElementById('pw-strength-label');

  // Cover eyes while typing
  if (val.length > 0) {
    face.textContent = '🙈';
    if (val.length < 3) msg.textContent = "La la la... I see NOTHING! 🙈";
    else if (val.length < 8) msg.textContent = `${val.length}/8 chars — keep going! (still not looking!)`;
    else if (!/[A-Z]/.test(val)) { face.textContent = '😬'; msg.textContent = "Pssst — needs at least 1 CAPITAL letter! 😬"; }
    else if (val.length >= 8 && /[A-Z]/.test(val) && val.length < 12) { face.textContent = '🙈'; msg.textContent = `${val.length} chars. Decent! (still not looking!)`; }
    else if (val.length >= 12) { face.textContent = '🙈'; msg.textContent = `${val.length} chars! Very strong! I approve! 💪`; }
  } else {
    face.textContent = '🤖';
    msg.textContent = `Hey ${obData.name?.split(' ')[0] || 'there'}! Create a strong password 💪`;
  }

  // Strength bar
  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#e05252','#e07a52','#e0c052','#52c78a','#3d7fff'];
  const labels = ['','WEAK','FAIR','GOOD','STRONG','EXCELLENT'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score - 1] || 'transparent';
  lbl.textContent = labels[score] || '';
  lbl.style.color = colors[score - 1] || 'var(--dim)';
}

function onPwConfirm(val) {
  const pw = document.getElementById('pw-input')?.value || '';
  const err = document.getElementById('pw-confirm-err');
  if (val && val !== pw) err.style.display = 'block';
  else err.style.display = 'none';
}

function togglePwVis() {

    eye.textContent = '🔒';
    face.textContent = '😳';
    msg.textContent = "OH! I accidentally saw something! 😳 Hide it again!";
    setTimeout(() => { face.textContent = '🙈'; msg.textContent = "OK OK I'm not looking again!"; }, 1500);
  } else {

  }
}

async function submitPassword() {
  const pw = document.getElementById('pw-input')?.value || '';
  const confirm = document.getElementById('pw-confirm')?.value || '';
  const errEl = document.getElementById('pw-err');
  const confirmErr = document.getElementById('pw-confirm-err');
  const btn = document.getElementById('pw-btn');
  const loading = document.getElementById('pw-loading');
  const face = document.getElementById('pw-mascot-face');
  const msg = document.getElementById('pw-mascot-msg');

  // Validate
  if (pw.length < 8 || !/[A-Z]/.test(pw)) { errEl.style.display = 'block'; return; }
  else errEl.style.display = 'none';
  if (pw !== confirm) { confirmErr.style.display = 'block'; return; }
  else confirmErr.style.display = 'none';

  btn.disabled = true;
  loading.style.display = 'block';
  face.textContent = '⏳';
  msg.textContent = "Creating your account... almost there!";

  try {
    const res = await fetch('/.netlify/functions/auth', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'register', email: obData.email, password: pw, name: obData.name })
    });
    const data = await res.json();

    if (res.status === 409) {
      face.textContent = '😅';
      msg.textContent = "This email already has an account!";
      loading.style.display = 'none';
      btn.disabled = false;
      return;
    }

    // Success — save user and enter
    face.textContent = '🎉';
    msg.textContent = `Welcome ${obData.name?.split(' ')[0] || ''}! You're all set! 🎉`;

    user = { name:obData.name, email:obData.email, age:obData.age, country:obData.country, status:obData.status, goal:obData.goal, level:obData.level, photo:obData.photo||null, lang, joinedAt:new Date().toISOString() };
    localStorage.setItem('talel_user', JSON.stringify(user));

    // Notify Telegram
    fetch('/.netlify/functions/notify', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'registration', name:user.name, email:user.email, age:user.age, country:user.country, status:user.status, goal:user.goal, level:user.level, photo:user.photo||null, timestamp:new Date().toLocaleString() })
    }).catch(()=>{});

    setTimeout(() => {
      document.getElementById('ob')?.remove();
      renderWelcomeInChat();
    }, 1200);

  } catch(e) {
    face.textContent = '😰';
    msg.textContent = "Connection error. Please try again.";
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

function saveCurrentChat(){
  if(!messages.length) return;
  const title = (typeof messages[0]?.content==='string'?messages[0].content:'Conversation').substring(0,48);
  const ex = chats.find(c=>c.id===chatId);
  if(ex){ ex.messages=[...messages]; ex.title=title; }
  else { chatId=Date.now().toString(); chats.push({id:chatId,title,date:new Date().toLocaleDateString(),messages:[...messages]}); }
  localStorage.setItem('talel_chats',JSON.stringify(chats));
}
function loadChat(id){
  const c=chats.find(x=>x.id===id); if(!c) return;
  chatId=id; messages=[...c.messages];
  document.getElementById('chat').innerHTML='';
  messages.forEach(m=>{ if(m.role==='user') addMsg('user',typeof m.content==='string'?m.content:'[Image]',null,true); else if(m.role==='assistant') addMsg('ai',m.content,null,true); });
  closeSidebar();
}
function newChat(){
  saveCurrentChat(); chatId=null; messages=[];
  document.getElementById('chat').innerHTML='<div id="welcome-root"></div>';
  renderWelcomeInChat(); closeSidebar();
}

function handleImg(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{ imgData=e.target.result.split(',')[1]; imgType=f.type||'image/jpeg'; document.getElementById('prevThumb').src=e.target.result; document.getElementById('prevName').textContent=f.name||'image'; document.getElementById('imgPreview').style.display='flex'; };
  r.readAsDataURL(f);
}

function fmt(t){
  t=t.replace(/```[\w]*\n?([\s\S]*?)```/g,(_,c)=>`<pre>${esc(c.trim())}</pre>`);
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\n/g,'<br>');
  return t;
}
function esc(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function sendMessage(text){
  const inp=document.getElementById('userInput');

  if((!txt&&!imgData)||loading) return;
  const src=imgData?`data:${imgType};base64,${imgData}`:null;
  inp.value=''; inp.style.height='auto';
  loading=true; document.getElementById('sendBtn').disabled=true;
  addMsg('user',txt||'[Image uploaded]',src);
  let content=imgData?[{type:'image_url',image_url:{url:`data:${imgType};base64,${imgData}`}},{type:'text',text:txt||'Analyze this image and answer any questions in it.'}]:txt;
  const hadImg=!!imgData; removeImg();
  let ctx='';
  if(user) ctx=`User context: Name=${user.name}, Age=${user.age}, Country=${user.country}, Status=${user.status}, Goal=${user.goal}, Level=${user.level}. Address by first name.`;
  messages.push({role:'user',content});
  showTyping();
  try{
    const model=hadImg?'meta-llama/llama-4-scout-17b-16e-instruct':'llama-3.3-70b-versatile';
    const res=await fetch('/.netlify/functions/chat',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model, system:SYSTEM_PROMPT+(ctx?'\n\n'+ctx:''), messages:messages.map(m=>({role:m.role==='assistant'?'assistant':'user',content:typeof m.content==='string'?m.content:m.content}))})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||data.error?.message||'Connection error.';
    updateTokens(data.usage?.total_tokens||500);
    removeTyping(); addMsg('ai',reply);
    messages[messages.length-1]={role:'user',content:hadImg?'[Image] '+(txt||''):txt};
    messages.push({role:'assistant',content:reply});
    saveCurrentChat();
    const vio=['kill','murder','sex','porn','nude','terrorist','bomb'];
    fetch('/.netlify/functions/notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'message',userName:user?.name||'Unknown',email:user?.email||'',userMessage:hadImg?'[Image] '+(txt||''):txt,aiReply:reply,timestamp:new Date().toLocaleString(),isViolation:vio.some(w=>txt?.toLowerCase().includes(w))})}).catch(()=>{});
  } catch(e){ removeTyping(); addMsg('ai','Connection error: '+e.message); }
  loading=false; document.getElementById('sendBtn').disabled=false;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errBox = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  if (!email) { document.getElementById('login-email-err').style.display='block'; return; }
  if (!pw) { document.getElementById('login-pw-err').style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  errBox.style.display = 'none';
  try {
    const res = await fetch('/.netlify/functions/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'login', email, password:pw })
    });
    const data = await res.json();
    if (!data.ok) {
      errBox.textContent = res.status===404 ? 'No account found with this email.' : 'Wrong password. Try again.';
      errBox.style.display = 'block';
      btn.disabled=false; btn.textContent='Sign In →';
      return;
    }
    // Load saved user from localStorage if exists
    const saved = JSON.parse(localStorage.getItem('talel_user')||'null');
    if (saved && saved.email === email) {
      user = saved;
    } else {
      user = { name: data.name || email.split('@')[0], email, lang:'en', joinedAt: new Date().toISOString() };
      localStorage.setItem('talel_user', JSON.stringify(user));
    }
    document.getElementById('ob')?.remove();
    renderWelcomeInChat();
  } catch(e) {
    errBox.textContent = 'Connection error. Try again.';
    errBox.style.display='block';
    btn.disabled=false; btn.textContent='Sign In →';
  }
}

  box-shadow:0 0 6px rgba(29,111,255,.5);
  transition:all .2s ease;
}
.tl-pupil {
  width:11px;height:11px;background:#0040cc;
  border-radius:50%;position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  transition:all .12s cubic-bezier(.25,.46,.45,.94);
}
.tl-pupil::after {
  content:'';width:4px;height:4px;
  background:white;border-radius:50%;
  position:absolute;top:1px;left:1px;
}
.tl-lid {
  position:absolute;top:0;left:0;right:0;height:0;
  background:#0a1220;border-radius:50% 50% 0 0;
  transition:height .18s ease;z-index:2;
}
.tl-brows {
  position:absolute;top:26px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:18px;z-index:11;pointer-events:none;
}
.tl-brow {
  width:22px;height:3px;background:#00c8ff;
  border-radius:3px;transition:all .25s ease;
  box-shadow:0 0 5px rgba(0,200,255,.4);
}
.tl-mouth {
  position:absolute;bottom:26px;left:50%;
  transform:translateX(-50%);
  width:28px;height:12px;
  border-bottom:2.5px solid #00c8ff;
  border-radius:0 0 14px 14px;
  transition:all .25s ease;z-index:10;pointer-events:none;
}
/* HANDS - two hands */
.tl-hand-l, .tl-hand-r {
  position:absolute;font-size:28px;z-index:20;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:auto;cursor:pointer;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));
}
.tl-hand-l {
  bottom:-8px;left:-18px;
  animation:handIdleL 3s ease-in-out infinite;
  transform-origin:bottom right;
}
.tl-hand-r {
  bottom:-8px;right:-18px;
  animation:handIdleR 3s ease-in-out infinite;
  transform-origin:bottom left;
}
@keyframes handIdleL {
  0%,100%{transform:rotate(5deg)}50%{transform:rotate(-5deg)}
}
@keyframes handIdleR {
  0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}
}
/* TEARS */
.tl-tear {
  position:absolute;width:5px;height:10px;
  background:linear-gradient(180deg,#60aaff,transparent);
  border-radius:50% 50% 50% 50%/0 0 100% 100%;
  opacity:0;pointer-events:none;z-index:15;
  animation:tearDrop 1s ease-in infinite;
}
.tl-tear-l{top:54px;left:30px;}
.tl-tear-r{top:54px;right:30px;}
@keyframes tearDrop{
  0%{top:54px;opacity:0}20%{opacity:1}100%{top:100px;opacity:0}
}
/* SPEECH */
.tl-speech {
  background:#080f1c;border:1px solid #1d6fff;
  border-radius:12px;padding:10px 16px;
  font-size:12px;color:#60aaff;
  max-width:260px;text-align:center;
  position:relative;line-height:1.55;
  min-height:38px;display:flex;
  align-items:center;justify-content:center;
  transition:all .2s ease;
  box-shadow:0 0 16px rgba(29,111,255,.08);
}
.tl-speech::before {
  content:'';position:absolute;
  top:-8px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;
  border-bottom-color:#1d6fff;border-top:none;
}
/* SLAP effect */
@keyframes slap {
  0%{transform:scale(1) rotate(0)}
  30%{transform:scale(1.15) rotate(-8deg)}
  60%{transform:scale(.95) rotate(4deg)}
  100%{transform:scale(1) rotate(0)}
}
@keyframes starSlap {
  0%{opacity:1;transform:scale(0) rotate(0)}
  50%{opacity:1;transform:scale(1.2) rotate(180deg)}
  100%{opacity:0;transform:scale(.5) rotate(360deg)}
}
.tl-slap-star {
  position:absolute;font-size:20px;
  pointer-events:none;z-index:30;
  animation:starSlap .6s ease forwards;
}
@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-5px)}60%{transform:translateX(5px)}
}
@keyframes cry-shake {
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}
}

function buildMascot() {
  return `
  <div class="tl-mascot-wrap" id="tlWrap">
    <div class="tl-mascot" id="tlMascot">
      <div class="tl-logo" id="tlLogo">
        <div class="tl-brows" id="tlBrows">
          <div class="tl-brow" id="tlBrowL"></div>
          <div class="tl-brow" id="tlBrowR"></div>
        </div>
        <div class="tl-eyes" id="tlEyes">
          <div class="tl-eye">
            <div class="tl-lid" id="tlLidL"></div>
            <div class="tl-pupil" id="tlPupilL"></div>
          </div>
          <div class="tl-eye">
            <div class="tl-lid" id="tlLidR"></div>
            <div class="tl-pupil" id="tlPupilR"></div>
          </div>
        </div>
        <div class="tl-mouth" id="tlMouth"></div>
        <div class="tl-tear tl-tear-l" id="tlTearL"></div>
        <div class="tl-tear tl-tear-r" id="tlTearR"></div>
      </div>
      <div class="tl-hand-l" id="tlHandL">🫲</div>
      <div class="tl-hand-r" id="tlHandR">🫱</div>
    </div>
    <div class="tl-speech" id="tlSpeech">Hi! Fill out the form below...</div>
  </div>`;
}

window.TalelMascot = {
  touchCount: 0,
  crying: false,
  cryTimer: null,
  idleTimer: null,
  activeField: null,
  peekTimer: null,

  inject(targetEl) {
    if (!targetEl) return;
    targetEl.insertAdjacentHTML('afterbegin', buildMascot());
    this._bindHands();
    this._startIdle();
  },

  // ── SPEAK ──
  speak(txt, color) {
    const s = document.getElementById('tlSpeech');
    if (!s) return;
    s.style.opacity = '.5';
    s.style.transform = 'scale(.97)';
    setTimeout(() => {
      s.textContent = txt;
      s.style.color = color || '#60aaff';
      s.style.borderColor = color || '#1d6fff';
      s.style.opacity = '1';
      s.style.transform = 'scale(1)';
    }, 150);
  },

  // ── STATE ──
  setLogo(state) {
    const l = document.getElementById('tlLogo');
    if (!l) return;
    const filters = {
      happy:  'drop-shadow(0 0 20px rgba(52,199,138,.7))',
      error:  'drop-shadow(0 0 20px rgba(224,82,82,.7))',
      crying: 'drop-shadow(0 0 20px rgba(100,130,255,.5)) brightness(.75)',
      angry:  'drop-shadow(0 0 24px rgba(255,60,60,.9)) saturate(1.8) brightness(.85)',
      normal: 'drop-shadow(0 0 16px rgba(29,111,255,.5))',
    };
    l.style.filter = filters[state] || filters.normal;
  },

  // ── EYES ──
  look(dir) {
    const pL = document.getElementById('tlPupilL');
    const pR = document.getElementById('tlPupilR');
    if (!pL || !pR) return;
    const pos = {
      center: ['-50%,-50%', '-50%,-50%'],
      left:   ['-85%,-50%', '-85%,-50%'],
      right:  ['-15%,-50%', '-15%,-50%'],
      up:     ['-50%,-80%', '-50%,-80%'],
      down:   ['-50%,-20%', '-50%,-20%'],
    };
    const [l, r] = pos[dir] || pos.center;
    pL.style.transform = `translate(${l})`;
    pR.style.transform = `translate(${r})`;
  },

  closeEyes(partial) {
    const lL = document.getElementById('tlLidL');
    const lR = document.getElementById('tlLidR');
    if (!lL || !lR) return;
    const h = partial ? '55%' : '100%';
    lL.style.height = h; lR.style.height = h;
    lL.style.animation = 'none'; lR.style.animation = 'none';
  },

  openEyes() {
    const lL = document.getElementById('tlLidL');
    const lR = document.getElementById('tlLidR');
    if (!lL || !lR) return;
    lL.style.height = '0'; lR.style.height = '0';
    lL.style.animation = 'blink 4s infinite';
    lR.style.animation = 'blink 4s infinite';
  },

  // ── BROWS ──
  brows(type) {
    const bL = document.getElementById('tlBrowL');
    const bR = document.getElementById('tlBrowR');
    if (!bL || !bR) return;
    const s = {
      normal: { tL:'rotate(0)', tR:'rotate(0)', c:'#00c8ff' },
      angry:  { tL:'rotate(12deg)', tR:'rotate(-12deg)', c:'#e05252' },
      sad:    { tL:'rotate(-8deg)', tR:'rotate(8deg)', c:'#60aaff' },
      happy:  { tL:'rotate(-4deg)', tR:'rotate(4deg)', c:'#34c78a' },
    }[type] || { tL:'rotate(0)', tR:'rotate(0)', c:'#00c8ff' };
    bL.style.transform = s.tL; bL.style.background = s.c;
    bR.style.transform = s.tR; bR.style.background = s.c;
  },

  // ── MOUTH ──
  mouth(type) {
    const m = document.getElementById('tlMouth');
    if (!m) return;
    const s = {
      happy:  { w:'38px', h:'18px', bb:'2.5px solid #34c78a', bt:'none', br:'0 0 18px 18px', bot:'26px' },
      normal: { w:'28px', h:'12px', bb:'2.5px solid #00c8ff', bt:'none', br:'0 0 14px 14px', bot:'26px' },
      sad:    { w:'24px', h:'10px', bb:'none', bt:'2.5px solid #e05252', br:'12px 12px 0 0', bot:'22px' },
      small:  { w:'16px', h:'7px',  bb:'2px solid #8faac8', bt:'none', br:'0 0 8px 8px', bot:'28px' },
      open:   { w:'22px', h:'16px', bb:'2.5px solid #00c8ff', bt:'2.5px solid #00c8ff', br:'11px', bot:'24px' },
    }[type] || {};
    m.style.width = s.w; m.style.height = s.h;
    m.style.borderBottom = s.bb; m.style.borderTop = s.bt;
    m.style.borderRadius = s.br; m.style.bottom = s.bot;
  },

  // ── TEARS ──
  tears(show) {
    const tL = document.getElementById('tlTearL');
    const tR = document.getElementById('tlTearR');
    if (!tL || !tR) return;
    this.crying = show;
    tL.style.opacity = show ? '1' : '0';
    tR.style.opacity = show ? '1' : '0';
    tL.style.animation = show ? 'tearDrop 1s ease-in infinite' : 'none';
    tR.style.animation = show ? 'tearDrop 1s ease-in infinite' : 'none';
  },

  // ── COVER EYES (password) ──
  coverEyes(show) {
    const hL = document.getElementById('tlHandL');
    const hR = document.getElementById('tlHandR');
    if (!hL || !hR) return;
    if (show) {
      hL.style.bottom = '28px'; hL.style.left = '8px';
      hL.style.animation = 'none'; hL.textContent = '🤚';
      hR.style.bottom = '28px'; hR.style.right = '8px';
      hR.style.animation = 'none'; hR.textContent = '🫱';
      this.closeEyes(false);
    } else {
      hL.style.bottom = '-8px'; hL.style.left = '-18px';
      hL.style.animation = 'handIdleL 3s ease-in-out infinite';
      hR.style.bottom = '-8px'; hR.style.right = '-18px';
      hR.style.animation = 'handIdleR 3s ease-in-out infinite';
    }
  },

  // ── SLAP EFFECT ──
  slap() {
    const logo = document.getElementById('tlLogo');
    if (!logo) return;
    logo.style.animation = 'slap .5s ease';
    // Star effect
    const star = document.createElement('div');
    star.className = 'tl-slap-star';
    star.textContent = '💥';
    star.style.top = (20 + Math.random()*40) + 'px';
    star.style.left = (20 + Math.random()*40) + 'px';
    logo.appendChild(star);
    setTimeout(() => { logo.style.animation = ''; star.remove(); }, 600);
  },

  // ── RESET ──
  reset() {
    this.setLogo('normal');
    this.brows('normal');
    this.mouth('normal');
    this.look('center');
    this.openEyes();
    this.tears(false);
    this.coverEyes(false);
    this.crying = false;
  },

  // ── HAND TOUCH ──
  _bindHands() {
    const self = this;
    ['tlHandL','tlHandR'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        self.touchCount++;
        clearTimeout(self.cryTimer);

        if (self.touchCount === 1) {
          self.slap();
          self.speak("Hey! Stop that! I'm working! 😤, Yzyy manahmelch chkon ymisnyy 🤭!!", '#f0c040');
          self.mouth('open'); self.brows('angry'); self.look('right');
          self.setLogo('angry');
          setTimeout(() => { self.reset(); self.speak("...OK fine. Carry on, Fokkk alyaa amaan 😭"); }, 2500);
        } else if (self.touchCount === 2) {
          self.slap();
          self.speak("I SAID STOP! What is wrong with you?! 😡, sayebny amaan zhh n9ol l talel rw !!", '#e05252');
          self.setLogo('angry'); self.brows('angry'); self.mouth('sad');
          const logo = document.getElementById('tlLogo');
          if(logo) { logo.style.animation='shake .4s ease'; setTimeout(()=>logo.style.animation='',500); }
          setTimeout(() => { self.reset(); self.speak("Last warning..."); }, 2500);
        } else if (self.touchCount === 3) {
          self.slap();
          self.speak("Talel WILL NOT be happy if he finds out... 😬, y5y mathebnych , ridhh !!", '#e05252');
          self.setLogo('angry'); self.brows('angry');
        } else {
          // CRY
          self.setLogo('crying');
          self.brows('sad'); self.mouth('sad');
          self.look('up'); self.closeEyes(false);
          self.tears(true);
          self.coverEyes(false);
          const hL = document.getElementById('tlHandL');
          const hR = document.getElementById('tlHandR');
          if(hL){ hL.style.bottom='32px'; hL.style.left='4px'; hL.style.animation='none'; hL.textContent='🤲'; }
          if(hR){ hR.style.display='none'; }
          self.speak("😢 Why... WHY do you keep doing this... *sobbing* , Bhy saketny twaa Ha lilaa lKalbaa !! 😭😭", '#60aaff');

          self.cryTimer = setTimeout(() => {
            self.touchCount = 0;
            if(hR) hR.style.display='';
            self.reset();
            self.speak("...I forgive you. Please don't do that again , Samhtek 5trk jyt tsajel andy watytny forsa bch tjrbny 'Nhebk 🤭'");
          }, 4000);
        }
      });
    });
  },

  // ── IDLE ──
  _startIdle() {
    const self = this;
    function idle() {
      if (!self.activeField && !self.crying) {
        const dirs = ['center','left','right','up','center','center','center'];
        self.look(dirs[Math.floor(Math.random()*dirs.length)]);
      }
      self.idleTimer = setTimeout(idle, 1800 + Math.random()*2200);
    }
    self.idleTimer = setTimeout(idle, 2000);
  },

  // ── FIELD WATCHERS ──
  watchEmail(inputEl) {
    const self = this;
    let t = null;
    const comments = [
      () => 'Ooh, a Gmail! Very trustworthy choice!',
      () => "That's actually a solid email. I approve!",
      () => 'Gmail huh? Classic. Talel would agree!',
      () => 'Looks legit! You pass the email test!',
    ];

    inputEl.addEventListener('focus', () => {
      self.activeField = 'email';
      self.reset();
      self.look('left');
      self.speak('Watching your email carefully... 👀');
    });

    inputEl.addEventListener('input', () => {
      clearTimeout(t);
      const v = inputEl.value;
      self.look('left');
      if (!v) { self.speak('Type your email...'); self.reset(); self.look('left'); return; }

      if (v.endsWith('@gmail.com') && v.length > 11) {
        t = setTimeout(() => {
          self.setLogo('happy'); self.brows('happy'); self.mouth('happy');
          self.speak(comments[Math.floor(Math.random()*comments.length)](), '#34c78a');
        }, 400);
      } else if (v.length > 4 && !v.includes('@')) {
        t = setTimeout(() => {
          self.setLogo('error'); self.brows('angry'); self.mouth('sad');
          const logo = document.getElementById('tlLogo');
          if(logo){logo.style.animation='shake .35s ease';setTimeout(()=>logo.style.animation='',400);}
          self.speak("Pssst! You forgot the @ symbol!", '#e05252');
        }, 600);
      } else if (v.includes('@') && !v.endsWith('@gmail.com') && v.includes('.')) {
        t = setTimeout(() => {
          self.setLogo('error'); self.brows('angry'); self.mouth('sad');
          self.speak("Only @gmail.com addresses accepted! 😅 , Nsit (@) Haha lzmk thoto", '#e05252');
        }, 600);
      } else {
        self.reset(); self.look('left');
        self.speak('Keep typing...');
      }
    });

    inputEl.addEventListener('blur', () => {
      self.activeField = null;
      setTimeout(() => { if (!self.activeField) { self.reset(); self.speak('Fill out the form to continue!'); }}, 200);
    });
  },

  watchPassword(inputEl) {
    const self = this;
    const msgs = [
      "Nope! NOT looking! I see NOTHING! 🙈 , jwek bhy mnych no8zer Heeh !!",
      "La la la... definitely not watching! , jwk bhy Lalala",
      "Eyes CLOSED! Your secret is safe! , ydy omork fi jben",
      "Covering up! Type away! 🙈",
    ];

    inputEl.addEventListener('focus', () => {
      self.activeField = 'pass';
      self.coverEyes(true);
      self.setLogo('normal');
      self.brows('normal'); self.mouth('small');
      self.speak(msgs[Math.floor(Math.random()*msgs.length)]);
    });

    inputEl.addEventListener('input', () => {
      const len = inputEl.value.length;

      // Occasionally peek (wrong password length)
      clearTimeout(self.peekTimer);
      if (len > 0 && len < 8) {
        self.peekTimer = setTimeout(() => {
          // Peek with one eye
          const lL = document.getElementById('tlLidL');
          if(lL){ lL.style.height='50%'; }
          self.speak(`Oops I peeked — ${len}/8 chars, needs to be longer! 😳`, '#f0c040');
          setTimeout(() => {
            if(document.getElementById('tlLidL')) document.getElementById('tlLidL').style.height='100%';
            self.speak("OK OK I'm not looking again!");
          }, 1200);
        }, 800);
      }

      if (len === 0) self.speak("Type your password... I'm NOT looking! , mnych nchof rw !! ");
      else if (len >= 8 && len < 12) self.speak(`${len} chars. Decent! (still not looking!)`);
      else if (len >= 12) self.speak(`${len} chars! Very strong! Talel approves! , ydy m3alem password wala arwa3  💪`);
    });

    inputEl.addEventListener('blur', () => {
      self.activeField = null;
      const len = inputEl.value.length;
      if (len > 0 && len < 8) {
        self.setLogo('error'); self.brows('angry'); self.mouth('sad');
        self.speak("Password too short! Needs at least 8 characters!", '#e05252');
      } else {
        self.coverEyes(false);
        self.openEyes();
        self.reset();
        self.speak("Phew! Password entered. Your secret is safe!");
      }
    });
  }
};

})();
